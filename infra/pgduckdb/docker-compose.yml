
services:

  # ── pg_duckdb ────────────────────────────────────────────────
  pg-duckdb:
    image: pgduckdb/pgduckdb:17-main
    container_name: pg-duckdb-new
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     ${PG_USER:-duckdb}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB:       ${PG_DB:-warehouse}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-2}
      S3TABLES_ARN:      ${S3TABLES_ARN}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-duckdb} -d ${PG_DB:-warehouse}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal


volumes:
  pgdata:

networks:
  internal:
    driver: bridge
